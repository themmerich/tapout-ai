name: CI

# Mirrors `node scripts/verify.mjs`: frontend lint/format/unit/build + e2e
# against a production build, and the backend Gradle build (Testcontainers).
on:
  push:
    branches: [main]
  pull_request:

# One in-flight run per ref; a new push cancels the previous run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      # Version mirrors the `packageManager` field in frontend/package.json.
      - uses: pnpm/action-setup@v4
        with:
          version: 11.12.0

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Unit tests
        run: pnpm test --watch=false

      - name: Production build
        run: pnpm build

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      # CI=true (set by GitHub Actions) makes playwright.config serve the
      # production build from the step above instead of the dev server.
      - name: E2E tests
        run: pnpm e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      # Configures Gradle and caches its dependencies and build state.
      - uses: gradle/actions/setup-gradle@v4

      # Ubuntu runners ship a running Docker daemon, so Testcontainers works
      # out of the box (see backend/src/test/.../TestcontainersConfiguration).
      - name: Build
        run: ./gradlew build
